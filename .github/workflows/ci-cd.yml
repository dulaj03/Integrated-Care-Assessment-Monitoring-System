name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend Tests ───────────────────────────────────────────
  backend-quality:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-key' }}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: test_db

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint
        continue-on-error: false

      - name: Run backend tests
        working-directory: ./backend
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage

  # ─── Frontend Tests ──────────────────────────────────────────
  frontend-quality:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: false

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  # ─── Admin Panel Tests ───────────────────────────────────────
  admin-quality:
    name: Admin Panel - Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: ./admin
        run: npm ci

      - name: Run ESLint
        working-directory: ./admin
        run: npm run lint
        continue-on-error: false

      - name: Run admin tests
        working-directory: ./admin
        run: npm run test:coverage

      - name: Build admin panel
        working-directory: ./admin
        run: npm run build

      - name: Upload admin coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./admin/coverage/coverage-final.json
          flags: admin
          name: admin-coverage

  # ─── Integration Tests ──────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, admin-quality]

    if: success()

    env:
      NODE_ENV: test
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-key' }}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: test_db

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run integration tests
        working-directory: ./backend
        run: npm run test -- tests/integration
        env:
          NODE_OPTIONS: --experimental-vm-modules

  # ─── Build Verification ─────────────────────────────────────
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, admin-quality]

    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install all dependencies
        run: |
          cd backend && npm ci && cd ..
          cd frontend && npm ci && cd ..
          cd admin && npm ci && cd ..

      - name: Verify backend build
        working-directory: ./backend
        run: npm run lint

      - name: Verify frontend build
        working-directory: ./frontend
        run: npm run build

      - name: Verify admin build
        working-directory: ./admin
        run: npm run build

  # ─── Security Checks ────────────────────────────────────────
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: |
          cd backend && npm ci && cd ..
          cd frontend && npm ci && cd ..
          cd admin && npm ci && cd ..

      - name: Run npm audit (backend)
        working-directory: ./backend
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (admin)
        working-directory: ./admin
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ─── Final Status Check ─────────────────────────────────────
  final-check:
    name: Final Status Check
    runs-on: ubuntu-latest
    needs:
      [
        backend-quality,
        frontend-quality,
        admin-quality,
        integration-tests,
        build-verification,
        security-checks,
      ]

    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.backend-quality.result }}" != "success" ] || \
             [ "${{ needs.frontend-quality.result }}" != "success" ] || \
             [ "${{ needs.admin-quality.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.build-verification.result }}" != "success" ]; then
             echo "❌ CI/CD Pipeline Failed - Please fix the errors above"
             exit 1
          fi
          echo "✅ CI/CD Pipeline Passed Successfully"
